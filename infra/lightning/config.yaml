# Lightning AI Fleet Configuration
#
# Provider-specific tunables only. This file controls how Studios are
# provisioned on Lightning AI — machine types, teamspace, launch behavior.
#
# Architecture concerns (which repos to clone, how agents coordinate) are
# NOT configured here. Those are passed in via the setup/main commands and
# environment variables. See infra/PROVIDER_CONTRACT.md.

teamspace: "chartsoo"
org: ""                           # Lightning AI org that owns the teamspace (leave empty to auto-detect)

runners:
  count: 3
  gpu_type: "L40S"               # H100 | H200 | A100 | L40S | L4 | T4
  studio_prefix: "runner"        # Studios named runner-0, runner-1, ...
  command: "echo 'Runner {runner_id} started' && sleep infinity"  # Placeholder — replaced by real runner command

reviewer:
  enabled: true
  gpu_type: "CPU"
  studio_name: "reviewer"
  command: "echo 'Reviewer started' && sleep infinity"  # Placeholder — replaced by real reviewer command

launch:
  run_setup: true                 # Run studio_setup.sh on each Studio before main command
  stagger_seconds: 5              # Delay between Studio launches (avoids API rate limits)
